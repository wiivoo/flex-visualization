name: Update Price Data

on:
  schedule:
    # Run daily at 13:30 UTC = 14:30 CET / 15:30 CEST
    # EPEX SPOT publishes D+1 day-ahead prices ~12:00 CET; SMARD ingests within ~1h
    - cron: '30 13 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download latest SMARD data (DE)
        run: node scripts/download-smard.mjs
        env:
          ENTSOE_API_TOKEN: ${{ secrets.ENTSOE_API_TOKEN }}

      - name: Update NL prices (ENTSO-E)
        run: node scripts/update-nl.mjs
        env:
          ENTSOE_API_TOKEN: ${{ secrets.ENTSOE_API_TOKEN }}

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/smard-prices.json public/data/smard-prices-qh.json public/data/smard-generation.json public/data/smard-meta.json public/data/nl-prices.json public/data/nl-prices-qh.json
          git commit -m "chore: update price data $(date -u '+%Y-%m-%d')"
          git push

      - name: No changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "Price data is already up to date — no commit needed."
