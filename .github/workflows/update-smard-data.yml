name: Update Day-Ahead Price Data

on:
  schedule:
    # Run daily at 13:30 UTC = 14:30 CET / 15:30 CEST
    # EPEX SPOT publishes D+1 day-ahead prices ~12:00 CET; SMARD ingests within ~1h
    - cron: '30 13 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Download latest SMARD data (DE)
        run: node scripts/download-smard.mjs
        env:
          ENTSOE_API_TOKEN: ${{ secrets.ENTSOE_API_TOKEN }}

      - name: Update NL prices (ENTSO-E)
        run: node scripts/update-nl.mjs
        env:
          ENTSOE_API_TOKEN: ${{ secrets.ENTSOE_API_TOKEN }}

      - name: Update GB prices (EPEX day-ahead DAA 1 / DAA 2)
        run: node scripts/update-gb.mjs

      - name: Update GB intraday auctions (EPEX IDA1 / IDA2)
        run: node scripts/update-gb-intraday-auctions.mjs
        continue-on-error: true

      - name: Update static intraday continuous files (DE / NL / GB)
        run: |
          node scripts/scrape-epex-intraday.mjs --area DE --static --days 4
          node scripts/scrape-epex-intraday.mjs --area NL --static --days 4
          node scripts/scrape-epex-intraday.mjs --area GB --static --days 4
        continue-on-error: true

      - name: Smoke test static price artifacts
        run: npm run smoke:data

      - name: Precompute management monthly aggregates
        run: node scripts/precompute-management-monthly.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet public/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git commit -m "chore: update price data and management aggregates $(date -u '+%Y-%m-%d')"
          git push

      - name: No changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "Price data is already up to date — no commit needed."
