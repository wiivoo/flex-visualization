trigger: none
pr: none

schedules:
- cron: "30 13 * * *"
  displayName: Daily day-ahead price refresh
  branches:
    include:
    - master
  always: true

variables:
  target_branch: 'master'
  refresh_image_name: 'flex-visualization-refresh'

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self
  persistCredentials: true
  fetchDepth: 0

- script: |
    git fetch origin $(target_branch)
    git checkout -B $(target_branch) origin/$(target_branch)
  displayName: Checkout target branch

- script: docker build --target refresh -t $(refresh_image_name):$(Build.BuildId) .
  displayName: Build refresh image

- script: |
    docker run --rm \
      -e ENTSOE_API_TOKEN="$(ENTSOE_API_TOKEN)" \
      -v "$(Build.SourcesDirectory)/public/data:/app/public/data" \
      $(refresh_image_name):$(Build.BuildId)
  displayName: Run Dockerized data refresh

- script: |
    if git diff --quiet public/data/; then
      echo "Price data is already up to date — no commit needed."
      exit 0
    fi

    git config user.name "Azure Pipelines"
    git config user.email "azure-pipelines@local"
    git add public/data/
    git commit -m "chore: update price data and management aggregates $(date -u '+%Y-%m-%d')"
    git push origin HEAD:$(target_branch)
  displayName: Commit and push updated data
